name: build & deploy

on:
  release:
    types: [published]
  push:
    branches: [ main, cicd ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # build in a clean linux box so lockfile/deps match prod
      - name: docker build site
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY="${{ secrets.TURNSTILE_SITE_KEY }}" \
            -t site-builder .

      - name: extract standalone bundle
        run: |
          rm -rf out && mkdir -p out
          docker run --rm --user "$(id -u):$(id -g)" -v "$PWD/out:/mnt/out" site-builder \
            sh -c 'cp -r /bundle/. /mnt/out/'

      - name: stamp version
        run: |
          mkdir -p out/public
          echo "${{ github.sha }}" > out/public/version.txt

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: out
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site
          path: site

      - name: write ssh key & known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: upload release (atomic)
        env:
          HOST: ${{ secrets.SSH_HOST }}
          USER: ${{ secrets.SSH_USER }}
          PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/var/www/portfolio' }}
          REL: ${{ github.run_number }}-${{ github.sha }}
          POST_DEPLOY: ${{ secrets.POST_DEPLOY || 'true' }}
        run: |
          rsync -az --delete -e "ssh -p $PORT" site/ "$USER@$HOST:$DEPLOY_PATH/releases/$REL/"
          ssh -p "$PORT" "$USER@$HOST" \
            "ln -sfn $DEPLOY_PATH/releases/$REL $DEPLOY_PATH/current && $POST_DEPLOY"

      - name: healthcheck
        if: ${{ vars.HEALTHCHECK_URL != '' }}
        run: |
          set -e
          for i in 1 2 3; do
            DEPLOYED=$(curl -fsSL "${{ vars.HEALTHCHECK_URL }}" || true)
            echo "Attempt $i — response: $DEPLOYED"
            if [ "$DEPLOYED" = "${{ github.sha }}" ]; then
              echo "Healthcheck passed"
              exit 0
            fi
            [ "$i" -lt 3 ] && sleep 2
          done
          echo "Healthcheck failed after 3 attempts"
          exit 1
